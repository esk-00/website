<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Side A / Side B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
</head>

<body>

<canvas id="webgl"></canvas>

<div class="cassette-rack-labels">
    <div class="label-item l1" data-target="about"></div>
    <div class="label-item l2" data-target="works"></div>
    <div class="label-item l3" data-target="skill"></div>
    <div class="label-item l4" data-target="playground"></div>
    <div class="label-item l5" data-target="appendix"></div>
    <div class="label-item l6" data-target="contact"></div>
</div>

<div class="rec-screen">
    <div class="rec-indicator"><span class="rec-dot"></span>REC</div>
    <div class="recording-text">Recording myself...</div>
    
    <div class="volume-wrapper">
        <div class="volume-label">VOLUME</div>
        <div class="slider-row">
            <span class="minus">−</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.1">
            <span class="plus">＋</span>
        </div>
        <div class="play-button" id="playBtn">▶</div>
    </div>
</div>

<script type="module" src="js/loading.js"></script>

</body>
</html>
